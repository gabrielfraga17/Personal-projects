<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>Convite Larah 15 Anos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Parisienne&display=swap');

        body {
            margin: 0;
            background: #fdf2f8;
            font-family: 'Montserrat', sans-serif;
        }

        /* Canvas fixo */
        .card {
            width: 1080px;
            height: 1920px;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Área das fotos */
        .photos {
            position: relative;
            margin-top: 60px;
            height: 720px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Foto principal — NÃO TOCADA */
        .photo-main {
            width: 600px;
            height: 720px;
            border-radius: 22px;
            border: 8px solid #fff;
            object-fit: cover;
            object-position: center top;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
            transform: rotate(2deg);
            z-index: 1;
        }

        /* Foto secundária — REENQUADRAMENTO FINAL */
        .photo-small {
            position: absolute;
            width: 360px;
            /* levemente menor */
            height: 245px;
            right: 40px;
            /* empurra para a borda */
            top: 460px;
            /* desce bem para fora da área central */
            border-radius: 18px;
            border: 6px solid #fff;
            object-fit: cover;
            object-position: center;
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
            transform: rotate(-3deg);
            z-index: 2;
        }

        /* Título */
        .neon {
            font-family: 'Parisienne', cursive;
            font-size: 110px;
            margin-top: 32px;
            color: #fff;
            text-shadow:
                0 0 8px #fff,
                0 0 16px #f9a8d4,
                0 0 28px #f472b6;
        }

        /* Botão */
        .btn-confirm {
            margin-top: 26px;
            background: #db2777;
            color: #fff;
            height: 56px;
            padding: 0 48px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        @media print {
            @page {
                size: 1080px 1920px;
                margin: 0;
            }

            body {
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="mt-10 text-[18px] tracking-[0.35em] text-pink-500">
            LARAH 15 ANOS
        </div>

        <div class="photos">
            <img src="./assets/adolescente.jpg" class="photo-main" />
            <img src="./assets/crianca.jpg" class="photo-small" />
        </div>

        <div class="neon">Happy Birthday</div>

        <div class="mt-5 text-[40px] font-bold">
            19 de Abril de 2026
        </div>

        <div class="text-[18px] tracking-widest uppercase text-pink-400">
            Das 13h às 19h
        </div>

        <div class="w-20 h-[3px] bg-pink-200 my-4"></div>

        <div class="text-[30px] font-bold uppercase">
            Sítio das Zitas
        </div>

        <div class="text-[16px] italic text-gray-400 mt-0.5">
            Vargem Grande – Rio de Janeiro
        </div>

        <div class="mt-6 text-[14px] tracking-[0.18em] uppercase text-gray-400">
            Piscina • Vôlei • Futebol • Música
        </div>

        <div class="mt-2 text-[18px] font-semibold uppercase text-pink-600">
            Traje: leve + roupa de banho
        </div>

        <a id="btn-confirm" class="btn-confirm">
            👉 CLIQUE AQUI PARA CONFIRMAR
        </a>

        <div class="mt-3 text-[14px] text-pink-500 font-semibold text-center">
            Digite o nome completo seu e dos acompanhantes<br>
            <span class="text-[12px] text-gray-400 font-normal">
                (válido somente para convidados)
            </span>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let query = params.toString();
        document.getElementById('btn-confirm').href = query ? `./rsvp.html?${query}` : './rsvp.html';
    </script>
</body>

</html>
