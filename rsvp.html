<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmar Presença – 15 Anos da Larah 🎉</title>
    <meta name="description" content="Confirme sua presença no evento 15 Anos da Larah">
    <!-- Open Graph for WhatsApp / social preview -->
    <meta property="og:title" content="Confirmar Presença – 15 Anos da Larah 🎉">
    <meta property="og:description" content="Clique para confirmar sua presença no evento!">
    <meta property="og:type" content="website">
    <style>
        :root {
            --apple-blue:   #0071E3;
            --apple-green:  #34C759;
            --apple-red:    #FF3B30;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --card-bg:      #FFFFFF;
            --radius-card:  28px;
            --radius-pill:  9999px;
            --radius-input: 14px;
            --shadow-modal: 0 24px 64px rgba(0,0,0,0.18);
            --font-family:  -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition:   all 0.3s cubic-bezier(0.25,0.1,0.25,1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding: 24px;
        }

        /* Glassmorphism background */
        .bg-layer {
            position: fixed;
            top: -30px; left: -30px; right: -30px; bottom: -30px;
            background-image: url('assets/bg-larah.jpg');
            background-size: cover;
            background-position: center 20%;
            filter: blur(18px) brightness(0.92) saturate(1.2);
            z-index: -2;
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(255,192,203,0.55) 0%, rgba(186,130,255,0.4) 50%, rgba(255,220,180,0.55) 100%);
            z-index: -1;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-radius: var(--radius-card);
            padding: 48px 40px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-modal);
            border: 1px solid rgba(255,255,255,0.6);
            animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.88) translateY(24px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    }
        }

        /* Avatar / Icon */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background-image: url('assets/bg-larah.jpg');
            background-size: cover;
            background-position: center 15%;
            border: 3px solid rgba(255,255,255,0.85);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            margin: 0 auto 24px;
            display: block;
        }

        /* Text */
        .label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.025em;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .event-meta {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 12px 0 28px;
            flex-wrap: wrap;
        }

        .event-meta span {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(0,0,0,0.07);
            margin: 0 -40px 28px;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label.field-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 15px 18px;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-radius: var(--radius-input);
            font-size: 16px;
            font-family: inherit;
            color: var(--text-primary);
            background: rgba(255,255,255,0.9);
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
            background: #fff;
        }

        /* Buttons */
        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7B5EA7 0%, #D16BA5 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(123,94,167,0.35);
            letter-spacing: -0.01em;
        }

        .btn-confirm:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 28px rgba(123,94,167,0.45);
        }

        .btn-confirm:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); }}

        /* Success / Error states */
        .state-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-big { font-size: 64px; line-height: 1; }

        .state-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .state-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Progress bar */
        .prog-wrap {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }
        .prog-fill {
            height: 100%;
            background: var(--apple-green);
            border-radius: 2px;
            width: 0%;
            transition: width 2.6s cubic-bezier(0.4,0,0.2,1);
        }

        .btn-wa {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 6px 20px rgba(37,211,102,0.35);
            margin-top: 8px;
        }
        .btn-wa:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(37,211,102,0.45); }

        .hint-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Footer */
        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.07);
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Netlify hidden form */
        .netlify-trap { display: none; }

        @media (max-width: 520px) {
            .card { padding: 36px 24px 32px; }
            .divider { margin: 0 -24px 24px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>

<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <!--
        NETLIFY FORMS — required static HTML for Netlify to detect the form at build time.
        This never displays to the user.
    -->
    <form class="netlify-trap" name="rsvp-confirmacoes" netlify netlify-honeypot="bot-field" data-netlify="true">
        <input type="hidden" name="form-name" value="rsvp-confirmacoes">
        <input type="text"   name="nome_convidado">
        <input type="text"   name="telefone">
        <input type="text"   name="acompanhantes">
        <input type="text"   name="confirmado_em">
        <input type="text"   name="guest_id">
        <input type="text"   name="source">
        <input type="text"   name="bot-field">
    </form>

    <div class="card" id="main-card">

        <!-- Event header (shown during form) -->
        <div id="event-header">
            <div class="avatar"></div>
            <p class="label">Você foi convidado(a) para</p>
            <h1 id="event-name-display">15 Anos da Larah 🎉</h1>
            <div class="event-meta" id="event-meta">
                <!-- populated by JS -->
            </div>
            <div class="divider"></div>
        </div>

        <!-- ── FORM STATE ────────────────────────────────────── -->
        <div id="form-state">
            <div class="form-group">
                <label class="field-label" for="input-nome">Seu nome completo *</label>
                <input type="text" id="input-nome" placeholder="Como você se chama?" autocomplete="given-name" required>
            </div>
            <div class="form-group">
                <label class="field-label" for="input-tel">WhatsApp (opcional)</label>
                <input type="tel" id="input-tel" placeholder="(11) 99999-0000" autocomplete="tel">
            </div>

            <!-- Acompanhantes -->
            <div class="form-group" style="margin-bottom:8px;">
                <label class="field-label">👥 Vou acompanhado(a)? <span style="font-weight:400; font-size:13px;">(opcional)</span></label>
                <div id="acomp-lista" style="display:flex; flex-direction:column; gap:8px; margin-top:6px;"></div>
                <button type="button" onclick="adicionarAcompanhante()" style="
                    background: rgba(0,113,227,0.08);
                    border: 1px dashed rgba(0,113,227,0.35);
                    border-radius: 12px;
                    color: var(--apple-blue);
                    font-size: 14px;
                    padding: 10px;
                    width: 100%;
                    cursor: pointer;
                    margin-top: 6px;
                    transition: all 0.2s;
                " id="btn-add-acomp">
                    + Adicionar acompanhante
                </button>
            </div>

            <button class="btn-confirm" id="btn-confirm" onclick="submitRSVP()">
                <span id="btn-text">🎉 Confirmar Presença</span>
                <span class="spinner" id="spinner"></span>
            </button>
        </div>

        <!-- ── SUCCESS STATE ─────────────────────────────────── -->
        <div class="state-panel" id="success-state">
            <div class="icon-big">🎊</div>
            <div class="state-title">Presença confirmada!</div>
            <div class="state-desc" id="success-desc">
                Oba! Sua confirmação foi registrada.
            </div>
            <div id="action-area"></div>
            <p class="hint-text" id="hint-text"></p>
        </div>

        <!-- ── ERROR STATE ───────────────────────────────────── -->
        <div class="state-panel" id="error-state">
            <div class="icon-big">😕</div>
            <div class="state-title">Link inválido</div>
            <div class="state-desc">
                Este link não é válido. Solicite ao organizador um novo link de confirmação.
            </div>
        </div>

        <div class="footer">
            Evento privado · Suas informações são usadas apenas para controle de presença.
        </div>
    </div>

    <script>
    (function () {

        /* ── Params ─────────────────────────────────────────── */
        const params    = new URLSearchParams(window.location.search);
        const guestId   = params.get('guest_id') || crypto.randomUUID?.() || Date.now().toString(36);
        const preNome   = params.get('name') || '';
        const preTel    = params.get('tel') || '';

        /* ── Pre-fill from URL params ─────────────────────── */
        if (preNome) document.getElementById('input-nome').value = preNome;
        if (preTel)  document.getElementById('input-tel').value  = preTel;

        /* ── Load event info from localStorage (organizer device) ── */
        let appState = null;
        let whatsappNum = '';
        try {
            appState = JSON.parse(localStorage.getItem('applePlannerState') || 'null');
            whatsappNum = (appState?.overview?.whatsapp || '').replace(/\D/g, '');

            const nomeEvento = appState?.overview?.local ? `15 Anos da Larah – ${appState.overview.local}` : null;
            if (nomeEvento) document.getElementById('event-name-display').textContent = nomeEvento + ' 🎉';

            const metaEl = document.getElementById('event-meta');
            if (appState?.overview?.data) {
                const parts = appState.overview.data.split('-');
                const dt = new Date(parts[0], parts[1]-1, parts[2]);
                const formatted = dt.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
                metaEl.innerHTML += `<span>📅 ${formatted}</span>`;
            }
            if (appState?.overview?.local) {
                metaEl.innerHTML += `<span>📍 ${appState.overview.local}</span>`;
            }
        } catch (e) { /* offline or first visit – fine */ }

        /* ── Acompanhantes ───────────────────────────────────── */
        let acompCount = 0;
        window.adicionarAcompanhante = function () {
            if (acompCount >= 6) return; // max 6 acompanhantes
            acompCount++;
            const lista = document.getElementById('acomp-lista');
            const wrap = document.createElement('div');
            wrap.style.cssText = 'display:flex; gap:8px; align-items:center;';
            wrap.innerHTML = `
                <input type="text" placeholder="Nome do acompanhante ${acompCount}" class="acomp-input" style="flex:1; padding:12px 16px; border:1.5px solid rgba(0,0,0,0.12); border-radius:var(--radius-input); font-size:15px; font-family:inherit; background:rgba(255,255,255,0.9);">
                <button type="button" onclick="this.parentElement.remove(); acompCount--;" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--apple-red); line-height:1;">×</button>
            `;
            lista.appendChild(wrap);
            if (acompCount >= 6) document.getElementById('btn-add-acomp').style.display = 'none';
        };

        /* ── Submit ─────────────────────────────────────────── */
        window.submitRSVP = async function () {
            const nome = document.getElementById('input-nome').value.trim();
            const tel  = document.getElementById('input-tel').value.trim();

            if (!nome) {
                document.getElementById('input-nome').focus();
                document.getElementById('input-nome').style.borderColor = '#FF3B30';
                setTimeout(() => document.getElementById('input-nome').style.borderColor = '', 1500);
                return;
            }

            // Collect acompanhantes
            const acompInputs = Array.from(document.querySelectorAll('.acomp-input'));
            const acompNomes  = acompInputs.map(i => i.value.trim()).filter(Boolean);

            /* Loading state */
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            document.getElementById('btn-text').textContent = 'Confirmando...';
            document.getElementById('spinner').style.display = 'block';

            const confirmedAt = new Date().toISOString();

            /* 1 — Netlify Forms submission */
            let netlifyOk = false;
            try {
                const fd = new FormData();
                fd.append('form-name',       'rsvp-confirmacoes');
                fd.append('nome_convidado',  nome);
                fd.append('telefone',        tel);
                fd.append('acompanhantes',   acompNomes.join(', '));
                fd.append('confirmado_em',   confirmedAt);
                fd.append('guest_id',        guestId);
                fd.append('source',          'link_individual');
                const resp = await fetch('/', { method: 'POST', body: fd });
                netlifyOk = resp.ok;
            } catch (e) {
                console.warn('Netlify Forms (expected when local):', e.message);
            }

            /* 2 — Local rsvp_log */
            try {
                const log = JSON.parse(localStorage.getItem('rsvp_log') || '[]');
                log.push({ guest_id: guestId, nome_convidado: nome, telefone: tel, acompanhantes: acompNomes, confirmado_em: confirmedAt, source: 'link_individual' });
                localStorage.setItem('rsvp_log', JSON.stringify(log));

                /* 3 — Update matching guest in planner state */
                if (appState?.gruposConvidados) {
                    let updated = false;
                    for (const grupo of Object.values(appState.gruposConvidados)) {
                        for (const pessoa of grupo) {
                            const rd = Array.isArray(pessoa) ? pessoa : (pessoa.rowData || []);
                            const matchId   = rd[4] && rd[4] === params.get('guest_id');
                            const matchName = rd[0] && rd[0].toLowerCase().trim() === nome.toLowerCase().trim();
                            if (matchId || matchName) { rd[1] = 'confirmado'; updated = true; }
                        }
                    }
                    if (updated) localStorage.setItem('applePlannerState', JSON.stringify(appState));
                }
            } catch (e) { console.warn('localStorage:', e.message); }

            /* Show success */
            showSuccess(nome, tel, acompNomes, netlifyOk);
        };

        function showSuccess(nome, tel, acompNomes, netlifyOk) {
            document.getElementById('form-state').style.display   = 'none';
            document.getElementById('event-header').style.display = 'none';
            document.getElementById('success-state').style.display = 'flex';

            const now       = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
            const telLine   = tel ? `\n📱 WhatsApp: ${tel}` : '';
            const acompLine = acompNomes.length > 0 ? `\n👥 Acompanhantes: ${acompNomes.join(', ')}` : '';
            const totalStr  = acompNomes.length > 0 ? ` (+ ${acompNomes.length} acompanhante(s))` : '';

            document.getElementById('success-desc').innerHTML =
                `Que ótimo, <strong>${nome}</strong>!${totalStr ? ' <em style="font-size:14px;color:var(--text-secondary);">' + totalStr + '</em>' : ''}<br>Sua presença foi registrada. 🌟`;

            const msg = encodeURIComponent(`✅ Confirmo minha presença no evento!\n\n👤 Nome: ${nome}${telLine}${acompLine}\n⏰ ${now}`);

            const waSvg = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.849L0 24l6.335-1.508A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.89 0-3.659-.498-5.19-1.37l-.372-.217-3.76.896.948-3.668-.241-.388A9.963 9.963 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>`;

            document.getElementById('action-area').innerHTML = `
                <a class="btn-wa" href="https://wa.me/?text=${msg}" target="_blank" rel="noopener" style="margin-top:16px;">
                    ${waSvg} Compartilhar confirmação
                </a>
                <p style="font-size:12px; color:var(--text-secondary); margin-top:10px;">
                    Escolha o contato ou grupo no WhatsApp.
                </p>`;

            document.getElementById('hint-text').textContent = netlifyOk
                ? '✅ Confirmação registrada no servidor.'
                : '✅ Confirmação registrada.';
        }

        /* Enter key submits */
        document.getElementById('input-nome').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitRSVP(); });
        document.getElementById('input-tel').addEventListener('keydown',  e => { if (e.key === 'Enter') window.submitRSVP(); });

    })();
    </script>

</body>
</html>
